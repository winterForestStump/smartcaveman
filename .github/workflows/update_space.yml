name: Run Python script

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Pinning huggingface_hub prevents the HfFolder ImportError
        pip install "huggingface_hub<0.29.0" gradio

    - name: Deploy to Spaces
      # DO NOT run a separate python login command here.
      # The line below handles the login automatically.
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }} 
      run: gradio deploy