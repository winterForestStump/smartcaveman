name: Run Python script

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # We pin the hub to 0.28.1 to fix the ImportError
        pip install "huggingface_hub==0.28.1" gradio

    - name: Deploy to Spaces
      env:
        # Verify this secret name is EXACTLY as written in GitHub Settings
        HF_TOKEN: ${{ secrets.HF_TOKEN }} 
      run: gradio deploy