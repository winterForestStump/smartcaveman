name: Deploy to Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Clean install exact versions
        run: |
          python -m pip install --upgrade pip
          python -m pip uninstall -y gradio huggingface_hub || true
          python -m pip install --no-cache-dir \
            gradio==4.44.1 \
            huggingface_hub==0.25.2

      - name: Verify versions
        run: |
          python -c "import gradio, huggingface_hub; print('gradio', gradio.__version__); print('hub', huggingface_hub.__version__)"

      - name: Deploy
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python -m gradio deploy --token $HF_TOKEN